services:
  mqtt:
    image: eclipse-mosquitto:2.0
    container_name: mqtt-broker
    ports:
      - "11883:1883"
      - "11884:8883"
      - "19001:9001"
    volumes:
      - ./data/mosquitto/data:/mosquitto/data
      - ./data/mosquitto/log:/mosquitto/log
      - ../certs:/certs
      - ../certs/pwfile:/tmp/pwfile
    environment:
      - TZ=Asia/Shanghai
    command: >
      /bin/sh -c "
        echo 'listener 1883' > /tmp/mosquitto.conf &&
        echo 'listener 8883' >> /tmp/mosquitto.conf &&
        echo 'allow_anonymous false' >> /tmp/mosquitto.conf &&
        echo 'password_file /tmp/pwfile' >> /tmp/mosquitto.conf &&
        echo 'certfile /certs/mosquitto.crt' >> /tmp/mosquitto.conf &&
        echo 'keyfile /certs/mosquitto.key' >> /tmp/mosquitto.conf &&
        cat /tmp/mosquitto.conf &&
        exec mosquitto -c /tmp/mosquitto.conf
      "
    networks:
      - mqtt-network
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: clickhouse-server
    ports:
      - "18123:8123"
      - "19000:9000"
      - "19009:9009"
    volumes:
      - ./data/clickhouse/data:/var/lib/clickhouse
      - ./data/clickhouse/logs:/var/log/clickhouse-server
    environment:
      - TZ=Asia/Shanghai
      - CLICKHOUSE_DB=mqtt_db
      - CLICKHOUSE_USER=mqtt_user
      - CLICKHOUSE_PASSWORD=mqtt_password
    networks:
      - mqtt-network
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

networks:
  mqtt-network:
    driver: bridge