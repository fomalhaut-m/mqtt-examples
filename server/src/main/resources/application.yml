spring:
  application:
    name: mqtt-subscriber
  # Spring Integration MQTT 配置
  mqtt:
    host: tcp://localhost:11883
    client-id: mqtt-server-${random.value}
    topic: device/+/reporter
    qos: 1
    username: mqtt_user
    password: mqtt_password
  
  # H2 数据库配置（设备信息）
  datasource:
    url: jdbc:h2:mem:device_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  
  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  
  # H2 Console
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8081

logging:
  level:
    root: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Mica MQTT 配置
mica:
  mqtt:
    # 客户端配置
    client:
      # 是否启用
      enabled: true
      # MQTT Broker 地址
      host: localhost
      # MQTT Broker 端口
      port: 11883
      # 用户名
      username: mqtt_user
      # 密码
      password: mqtt_password
      # 客户端ID
      client-id: mica-mqtt-client-${random.value}
      # 协议版本 (3.1, 3.1.1, 5.0)
      protocol-version: 3.1.1
      # 心跳间隔（秒）
      keep-alive: 60
      # 超时时间（秒）
      timeout: 10
      # 是否自动重连
      reconnect: true
      # 是否清理会话
      clean-session: true
      # 订阅的主题列表
      topics:
        - topic: device/+/reporter
          qos: 1
        - topic: device/+/status
          qos: 0
