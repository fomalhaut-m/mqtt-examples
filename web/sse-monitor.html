<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MQTT 实时数据监控 - SSE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .status-bar {
            background: white;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ccc;
        }
        
        .status-dot.connected {
            background: #4CAF50;
            animation: pulse 2s infinite;
        }
        
        .status-dot.disconnected {
            background: #f44336;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .btn-connect {
            background: #4CAF50;
            color: white;
        }
        
        .btn-connect:hover {
            background: #45a049;
        }
        
        .btn-disconnect {
            background: #f44336;
            color: white;
        }
        
        .btn-disconnect:hover {
            background: #da190b;
        }
        
        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .device-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        
        .device-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }
        
        .device-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .device-id {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
        
        .device-status {
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .status-online {
            background: #e8f5e9;
            color: #4CAF50;
        }
        
        .status-offline {
            background: #ffebee;
            color: #f44336;
        }
        
        .status-error {
            background: #fff3e0;
            color: #ff9800;
        }
        
        .metric {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .metric:last-child {
            border-bottom: none;
        }
        
        .metric-label {
            color: #666;
            font-size: 14px;
        }
        
        .metric-value {
            font-weight: bold;
            color: #333;
            font-size: 16px;
        }
        
        .log-panel {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-height: 300px;
            overflow-y: auto;
        }
        
        .log-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }
        
        .log-entry {
            padding: 8px;
            margin-bottom: 5px;
            border-radius: 5px;
            font-size: 13px;
            font-family: 'Courier New', monospace;
        }
        
        .log-info {
            background: #e3f2fd;
            color: #1976d2;
        }
        
        .log-success {
            background: #e8f5e9;
            color: #388e3c;
        }
        
        .log-warning {
            background: #fff3e0;
            color: #f57c00;
        }
        
        .log-error {
            background: #ffebee;
            color: #d32f2f;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔌 MQTT 实时数据监控</h1>
        
        <div class="status-bar">
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">未连接</span>
            </div>
            <div>
                <button class="btn btn-connect" onclick="connect()">连接</button>
                <button class="btn btn-disconnect" onclick="disconnect()" style="margin-left: 10px;">断开</button>
            </div>
        </div>
        
        <div class="data-grid" id="deviceGrid">
            <!-- 设备卡片将动态添加到这里 -->
        </div>
        
        <div class="log-panel">
            <div class="log-title">📋 实时日志</div>
            <div id="logContainer"></div>
        </div>
    </div>
    
    <script>
        let eventSource = null;
        let devices = new Map();
        
        function connect() {
            if (eventSource) {
                addLog('已经连接，无需重复连接', 'warning');
                return;
            }
            
            const clientId = 'web-client-' + Date.now();
            const url = `http://localhost:8081/api/sse/connect?clientId=${clientId}`;
            
            addLog(`正在连接到: ${url}`, 'info');
            
            eventSource = new EventSource(url);
            
            // 连接成功
            eventSource.addEventListener('connected', (event) => {
                const data = JSON.parse(event.data);
                addLog(`✅ ${data.message}`, 'success');
                updateStatus(true);
            });
            
            // 接收设备数据
            eventSource.addEventListener('deviceData', (event) => {
                const data = JSON.parse(event.data);
                addLog(`📥 收到设备数据: ${data.deviceId}`, 'info');
                updateDeviceCard(data);
            });
            
            // 接收设备状态
            eventSource.addEventListener('deviceStatus', (event) => {
                const data = JSON.parse(event.data);
                addLog(`📊 设备状态变化: ${data.deviceId} -> ${data.status}`, 'info');
            });
            
            // 接收告警
            eventSource.addEventListener('alert', (event) => {
                const data = JSON.parse(event.data);
                addLog(`⚠️ 告警: ${data.deviceId} - ${data.error}`, 'error');
            });
            
            // 错误处理
            eventSource.onerror = (error) => {
                addLog('❌ SSE连接错误', 'error');
                updateStatus(false);
                eventSource.close();
                eventSource = null;
            };
        }
        
        function disconnect() {
            if (eventSource) {
                eventSource.close();
                eventSource = null;
                updateStatus(false);
                addLog('已断开连接', 'warning');
            } else {
                addLog('当前未连接', 'warning');
            }
        }
        
        function updateStatus(connected) {
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            
            if (connected) {
                statusDot.className = 'status-dot connected';
                statusText.textContent = '已连接';
            } else {
                statusDot.className = 'status-dot disconnected';
                statusText.textContent = '未连接';
            }
        }
        
        function updateDeviceCard(data) {
            const deviceId = data.deviceId;
            
            if (!devices.has(deviceId)) {
                // 创建设备卡片
                const card = createDeviceCard(deviceId);
                document.getElementById('deviceGrid').appendChild(card);
                devices.set(deviceId, card);
            }
            
            const card = devices.get(deviceId);
            
            // 更新数据
            card.querySelector('.temperature').textContent = data.temperature ? `${data.temperature}°C` : 'N/A';
            card.querySelector('.humidity').textContent = data.humidity ? `${data.humidity}%` : 'N/A';
            card.querySelector('.voltage').textContent = data.voltage ? `${data.voltage}V` : 'N/A';
            
            // 更新状态
            const statusEl = card.querySelector('.device-status');
            statusEl.textContent = data.status || 'unknown';
            statusEl.className = `device-status status-${data.status || 'offline'}`;
            
            // 更新时间
            card.querySelector('.last-update').textContent = new Date().toLocaleTimeString();
        }
        
        function createDeviceCard(deviceId) {
            const card = document.createElement('div');
            card.className = 'device-card';
            card.innerHTML = `
                <div class="device-header">
                    <div class="device-id">${deviceId}</div>
                    <div class="device-status status-offline">offline</div>
                </div>
                <div class="metric">
                    <span class="metric-label">🌡️ 温度</span>
                    <span class="metric-value temperature">N/A</span>
                </div>
                <div class="metric">
                    <span class="metric-label">💧 湿度</span>
                    <span class="metric-value humidity">N/A</span>
                </div>
                <div class="metric">
                    <span class="metric-label">⚡ 电压</span>
                    <span class="metric-value voltage">N/A</span>
                </div>
                <div class="metric">
                    <span class="metric-label">🕐 最后更新</span>
                    <span class="metric-value last-update">-</span>
                </div>
            `;
            return card;
        }
        
        function addLog(message, type = 'info') {
            const logContainer = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logContainer.insertBefore(entry, logContainer.firstChild);
            
            // 限制日志数量
            while (logContainer.children.length > 50) {
                logContainer.removeChild(logContainer.lastChild);
            }
        }
        
        // 页面加载时自动连接
        window.addEventListener('load', () => {
            addLog('页面加载完成，点击"连接"按钮开始接收数据', 'info');
        });
        
        // 页面关闭时断开连接
        window.addEventListener('beforeunload', () => {
            if (eventSource) {
                eventSource.close();
            }
        });
    </script>
</body>
</html>
